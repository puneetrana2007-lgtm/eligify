<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Test</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        #output { border: 1px solid #ccc; padding: 20px; min-height: 200px; white-space: pre-wrap; background: #f5f5f5; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        input { padding: 10px; width: 70%; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🤖 Eligify AI Chat - Test Console</h1>
    
    <div>
        <input type="text" id="messageInput" placeholder="Type a message..." value="What is SSC CGL?">
        <button onclick="testChat()">Send Test</button>
    </div>
    
    <h2>Test Results:</h2>
    <div id="output">Waiting for test...</div>
    
    <script>
        async function testChat() {
            const output = document.getElementById('output');
            const message = document.getElementById('messageInput').value;
            
            output.innerHTML = 'Testing connection to ai_chat.php...\n\n';
            
            try {
                const response = await fetch('ai_chat.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });
                
                output.innerHTML += `Response Status: ${response.status} ${response.statusText}\n`;
                output.innerHTML += `Content-Type: ${response.headers.get('content-type')}\n\n`;
                
                const data = await response.json();
                output.innerHTML += 'Response Data:\n';
                output.innerHTML += JSON.stringify(data, null, 2);
                
            } catch (error) {
                output.innerHTML += `❌ Error: ${error.message}\n`;
                output.innerHTML += error.stack;
            }
        }
    </script>
</body>
</html>
